<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHRONIS — Signal Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;700&family=Sora:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#03030a;color:#e4e4f0;font-family:'Sora',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
a{color:inherit;text-decoration:none}
.back-btn{position:fixed;top:16px;left:16px;z-index:100;display:flex;align-items:center;gap:8px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:600;letter-spacing:4px;color:#d4a539;padding:10px 20px;background:rgba(3,3,10,.9);backdrop-filter:blur(12px);border:1px solid rgba(255,215,0,.08);transition:all .3s}.back-btn:hover{border-color:#d4a539}
.scanner-title{font-family:'Orbitron',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:800;letter-spacing:4px;color:#ffd700;margin-bottom:8px;text-align:center}
.scanner-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:#5a5a80;margin-bottom:40px;text-align:center}
.scanner-box{width:100%;max-width:600px;background:rgba(12,12,30,.7);border:1px solid rgba(255,215,0,.08);padding:40px;backdrop-filter:blur(8px);position:relative}
.freq-display{font-family:'Orbitron',sans-serif;font-size:clamp(36px,8vw,56px);font-weight:900;color:#00e5ff;text-align:center;margin-bottom:8px;text-shadow:0 0 20px rgba(0,229,255,.3)}
.freq-unit{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:4px;color:#5a5a80;text-align:center;margin-bottom:32px}
.slider-wrap{position:relative;margin-bottom:32px}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:linear-gradient(90deg,#1a1a2a,#ffd700,#00e5ff,#1a1a2a);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:28px;background:#ffd700;border:none;cursor:pointer;box-shadow:0 0 20px rgba(255,215,0,.3)}
.markers{display:flex;justify-content:space-between;margin-top:8px}
.markers span{font-family:'JetBrains Mono',monospace;font-size:8px;color:#2a2a4a;letter-spacing:1px}
.signal-output{min-height:120px;border:1px solid #1a1a2a;padding:20px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;overflow-y:auto;max-height:200px;transition:border-color .3s}
.signal-output.active{border-color:#00e5ff;box-shadow:0 0 20px rgba(0,229,255,.05)}
.signal-static{color:#333;animation:static-flicker .1s infinite}
@keyframes static-flicker{0%{opacity:.3}50%{opacity:.8}100%{opacity:.3}}
.signal-found{color:#00ff88;animation:signal-reveal .5s}
.signal-lore{color:#ffd700}
.signal-error{color:#ff2d55}
@keyframes signal-reveal{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
.scan-btn{display:block;width:100%;margin-top:20px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;letter-spacing:4px;padding:14px;background:none;border:1px solid #00e5ff;color:#00e5ff;cursor:pointer;transition:all .3s}
.scan-btn:hover{background:#00e5ff;color:#03030a}
.hint{font-family:'JetBrains Mono',monospace;font-size:9px;color:#2a2a4a;text-align:center;margin-top:24px;transition:color .5s}
.hint:hover{color:#5a5a80}
</style>
</head>
<body>
<a href="index.html" class="back-btn"><span>←</span> CHRONIS</a>
<h1 class="scanner-title">SIGNAL SCANNER</h1>
<p class="scanner-sub">SCAN MULTIVERSAL FREQUENCIES FOR ANOMALOUS SIGNALS</p>
<div class="scanner-box">
  <div class="freq-display" id="freqDisplay">440.0</div>
  <div class="freq-unit">Hz — MULTIVERSAL FREQUENCY</div>
  <div class="slider-wrap">
    <input type="range" id="freqSlider" min="20" max="2000" value="440" step="0.1" oninput="updateFreq(this.value)">
    <div class="markers"><span>20 Hz</span><span>500 Hz</span><span>1000 Hz</span><span>2000 Hz</span></div>
  </div>
  <button class="scan-btn" onclick="scanFrequency()">SCAN FREQUENCY</button>
  <div class="signal-output" id="signalOutput">
    <div class="signal-static">Awaiting scan...</div>
  </div>
</div>
<div class="hint">Certain frequencies carry messages from across the multiverse.</div>
<script>
const signals={
  55:{type:'lore',text:'[DEEP RESONANCE DETECTED]\n\nThis is the base frequency of The Chronis.\nIt hums at 55 Hz — the lowest note\nthe universe remembers.\n\nDOSSIER CODE: CHRONISHUM'},
  110:{type:'lore',text:'[HARMONIC DETECTED — KRONII\'S FREQUENCY]\n\n"Time doesn\'t flow. It vibrates.\nI am that vibration."\n— Kronii'},
  174:{type:'found',text:'[SIGNAL RECOVERED — WATSON]\n\n"If you can hear this, I\'m still\nlooking. Don\'t give up on me.\nDon\'t give up on her."\n— A.W.'},
  396:{type:'lore',text:'[FREQUENCY OF LIBERATION]\n\nThis frequency appears in Sherry\'s\nresidual pattern. It pulses once\nevery 47 seconds.\n\nShe\'s still resonating.\n\nDOSSIER CODE: RESONANCE396'},
  432:{type:'found',text:'[ANOMALY — PRE-COINCIDENCE SIGNAL]\n\nThis transmission predates The Great\nCoincidence. It should not exist.\n\n"The watch knows the way home."\n— Unknown'},
  528:{type:'lore',text:'[DNA REPAIR FREQUENCY]\n\nThe Chronis broadcasts at 528 Hz\nwhen attempting to reconstruct\ndamaged timeline segments.\n\nTimeline ΩΩ-1 was first detected\nat this frequency.'},
  741:{type:'found',text:'[CHAOS FREQUENCY — UNSTABLE]\n\nlol you found me\n\nstop looking for sherry at 741hz\nshe\'s not here\nshe\'s at a frequency that\ndoesn\'t have a number yet\n\n— C.\n\nDOSSIER CODE: CHAOSFREQUENCY'},
  963:{type:'lore',text:'[OMEGA FREQUENCY — PINEAL ACTIVATION]\n\nThe highest recorded frequency\nof The Chronis. Only detected once —\nat the exact moment of The Convergence.\n\nThe Avatars could hear it.\nHumans cannot.\nYou just did.'},
  1111:{type:'found',text:'[TIMELINE ΩΩ-1 CARRIER SIGNAL]\n\n████████████████████████\nSIGNAL SOURCE: DOES NOT EXIST\nSIGNAL STATUS: ACTIVE\n████████████████████████\n\nSomething is broadcasting from\na timeline that hasn\'t been created yet.\n\nDOSSIER CODE: OMEGACARRIER'},
};
function updateFreq(v){document.getElementById('freqDisplay').textContent=parseFloat(v).toFixed(1)}
function scanFrequency(){
  const f=parseFloat(document.getElementById('freqSlider').value);
  const out=document.getElementById('signalOutput');
  out.className='signal-output active';
  out.innerHTML='<div class="signal-static">Scanning '+f.toFixed(1)+' Hz...</div>';
  setTimeout(()=>{
    let found=null;
    for(const[freq,data] of Object.entries(signals)){
      if(Math.abs(f-parseFloat(freq))<5){found=data;break}
    }
    if(found){
      out.innerHTML='<div class="signal-'+(found.type==='lore'?'lore':'found')+'">'+found.text.replace(/\n/g,'<br>')+'</div>';
    } else {
      const statics=['...static...','...no signal...','...interference...','...empty...','...void...'];
      let html='';for(let i=0;i<4;i++)html+='<div class="signal-static">'+statics[Math.floor(Math.random()*statics.length)]+'</div>';
      html+='<div class="signal-error">No anomalous signal detected at this frequency.</div>';
      out.innerHTML=html;
    }
  },1500);
}
</script>
</body>
</html>
